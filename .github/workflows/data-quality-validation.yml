name: MSPR2 - Data Quality Validation

on:
  # Permettre exécution manuelle
  workflow_dispatch:
    inputs:
      hours:
        description: 'Nombre d heures à analyser'
        required: false
        default: '24'
      strict:
        description: 'Mode strict (échoue si warnings)'
        required: false
        type: boolean
        default: false

jobs:
  validate-data-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate data quality
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
        run: |
          HOURS=${{ github.event.inputs.hours || '2' }}
          STRICT=${{ github.event.inputs.strict == 'true' && '--strict' || '' }}
          python scripts/validate_data_quality.py --hours $HOURS $STRICT
      
      - name: Create validation report
        if: always()
        run: |
          echo "## Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "Période analysée : ${{ github.event.inputs.hours || '2' }} heures" >> $GITHUB_STEP_SUMMARY
          echo "Mode strict : ${{ github.event.inputs.strict }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Voir les logs ci-dessus pour le rapport détaillé" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "🚨 ALERTE: Problèmes de qualité des données détectés !"
          echo "Consultez les logs pour les détails"
          # TODO: Ajouter notification Slack/Discord/Email ici
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d "{'text':'Data quality issues detected'}"
